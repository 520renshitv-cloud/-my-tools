<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<style>
  :root {
    --work: #e65c4b;
    --break: #4caf84;
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #e0e0e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
  }
  .container { text-align: center; }
  .timer-ring {
    position: relative;
    width: 320px; height: 320px;
    margin: 0 auto 32px;
  }
  svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #2a2a4a; stroke-width: 8; }
  .ring-fg {
    fill: none; stroke: var(--work); stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s, stroke 0.5s;
  }
  .ring-fg.break-mode { stroke: var(--break); }
  .time-display {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .time { font-size: 72px; font-weight: 300; color: #fff; letter-spacing: 2px; }
  .label { font-size: 14px; color: #aaa; margin-top: 4px; text-transform: uppercase; letter-spacing: 3px; }
  .session-count { font-size: 13px; color: #666; margin-top: 8px; }
  .controls { display: flex; gap: 16px; justify-content: center; margin-top: 24px; }
  button {
    border: none; border-radius: 50px;
    padding: 12px 32px; font-size: 15px;
    cursor: pointer; font-weight: 600;
    transition: all 0.2s;
  }
  button:active { transform: scale(0.95); }
  .btn-start { background: var(--work); color: #fff; }
  .btn-start:hover { background: #f07363; }
  .btn-start.break-mode { background: var(--break); }
  .btn-start.break-mode:hover { background: #5dbf94; }
  .btn-reset { background: transparent; color: #888; border: 1px solid #444; }
  .btn-reset:hover { color: #ccc; border-color: #666; }

  .mode-switch {
    display: flex; gap: 4px; background: var(--card);
    border-radius: 50px; padding: 4px;
    margin-bottom: 32px;
  }
  .mode-btn {
    border: none; border-radius: 50px;
    padding: 8px 20px; font-size: 13px;
    cursor: pointer; background: transparent;
    color: #777; font-weight: 600;
    transition: all 0.3s;
  }
  .mode-btn.active {
    background: #2a2a5a; color: #fff;
  }
  .mode-btn.active.work-active { background: var(--work); }
  .mode-btn.active.break-active { background: var(--break); }

  .preset-time {
    display: flex; gap: 12px; justify-content: center;
    margin-top: 20px;
  }
  .preset {
    background: var(--card); border: none;
    color: #888; padding: 6px 14px; border-radius: 20px;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .preset:hover, .preset.active { color: #fff; background: #2a2a5a; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .running .time { animation: pulse 2s infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="mode-switch">
    <button class="mode-btn active work-active" data-mode="work">🍅 专注</button>
    <button class="mode-btn" data-mode="shortBreak">☕ 短休</button>
    <button class="mode-btn" data-mode="longBreak">🌿 长休</button>
  </div>

  <div class="timer-ring">
    <svg width="320" height="320" viewBox="0 0 320 320">
      <circle class="ring-bg" cx="160" cy="160" r="148"/>
      <circle id="ring" class="ring-fg" cx="160" cy="160" r="148"
        stroke-dasharray="929.9" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display" id="display">
      <div class="time" id="time">25:00</div>
      <div class="label" id="status">专注</div>
      <div class="session-count" id="count">🍅 × 0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-reset" id="btnReset">重置</button>
    <button class="btn-start" id="btnStart">开始</button>
  </div>

  <div class="preset-time">
    <button class="preset active" data-min="25">25 分钟</button>
    <button class="preset" data-min="45">45 分钟</button>
    <button class="preset" data-min="50">50 分钟</button>
    <button class="preset" data-min="90">90 分钟</button>
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 148; // 929.9
const ring = document.getElementById('ring');
const timeEl = document.getElementById('time');
const statusEl = document.getElementById('status');
const countEl = document.getElementById('count');
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');
const container = document.querySelector('.container');

const MODES = {
  work: { label: '专注', minutes: 25, icon: '🍅' },
  shortBreak: { label: '短休', minutes: 5, icon: '☕' },
  longBreak: { label: '长休', minutes: 15, icon: '🌿' },
};

let mode = 'work';
let totalSeconds = MODES[mode].minutes * 60;
let remaining = totalSeconds;
let interval = null;
let sessions = 0;

function fmt(t) {
  const m = Math.floor(t / 60).toString().padStart(2, '0');
  const s = (t % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateDisplay() {
  timeEl.textContent = fmt(remaining);
  const progress = remaining / totalSeconds;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  ring.classList.toggle('break-mode', mode !== 'work');
  btnStart.classList.toggle('break-mode', mode !== 'work');
  timeEl.style.color = mode === 'work' ? '#fff' : '#e0e0e0';
}

function switchMode(newMode) {
  mode = newMode;
  totalSeconds = MODES[mode].minutes * 60;
  remaining = totalSeconds;
  ring.style.strokeDashoffset = 0;
  ring.classList.toggle('break-mode', mode !== 'work');
  btnStart.classList.toggle('break-mode', mode !== 'work');
  statusEl.textContent = MODES[mode].label;
  timeEl.textContent = fmt(remaining);
  document.querySelectorAll('.mode-btn').forEach(b => { b.classList.remove('active', 'work-active', 'break-active'); });
  const activeBtn = document.querySelector(`[data-mode="${mode}"]`);
  if (activeBtn) {
    activeBtn.classList.add('active');
    activeBtn.classList.add(mode === 'work' ? 'work-active' : 'break-active');
  }
  document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
  const matchPreset = document.querySelector(`.preset[data-min="${MODES[mode].minutes}"]`);
  if (matchPreset) matchPreset.classList.add('active');
}

function tick() {
  if (remaining <= 0) {
    clearInterval(interval);
    interval = null;
    btnStart.textContent = '开始';
    container.classList.remove('running');
    if (mode === 'work') {
      sessions++;
      countEl.textContent = `🍅 × ${sessions}`;
      new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+Af3+AgH+AgICAAAAAgH9/f39/gIB/f3+AgH+AgICAf39/f38AAAAAgH+AgICAgICAgIGAgICAgICAgIGAf39/f39/f39/gICAgICAgIGAgH9/f39/f39/f39/gICAgICAgIGAgH9/f39/f39/f3+AgICAgICAgICAf39/f39/f39/f3+AgICAgICAgICAf39/f39/f39/f4CAgICAgICAgIB/f39/f39/f3+AgICAgICAgICAf39/f39/f3+AgICAgICAgICAAAAA').play().catch(()=>{});
      setTimeout(() => switchMode(sessions % 4 === 0 ? 'longBreak' : 'shortBreak'), 600);
    } else {
      switchMode('work');
    }
    if (!interval) {
      updateDisplay();
      btnStart.textContent = '开始';
    }
    return;
  }
  remaining--;
  updateDisplay();
}

btnStart.addEventListener('click', () => {
  if (interval) {
    clearInterval(interval);
    interval = null;
    btnStart.textContent = '继续';
    container.classList.remove('running');
  } else {
    if (remaining <= 0) switchMode(mode);
    interval = setInterval(tick, 1000);
    btnStart.textContent = '暂停';
    container.classList.add('running');
  }
});

btnReset.addEventListener('click', () => {
  clearInterval(interval);
  interval = null;
  remaining = totalSeconds;
  updateDisplay();
  btnStart.textContent = '开始';
  container.classList.remove('running');
});

document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    clearInterval(interval);
    interval = null;
    btnStart.textContent = '开始';
    container.classList.remove('running');
    switchMode(b.dataset.mode);
  });
});

document.querySelectorAll('.preset').forEach(b => {
  b.addEventListener('click', () => {
    const min = parseInt(b.dataset.min);
    MODES.work.minutes = min;
    document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
    b.classList.add('active');
    if (mode === 'work') {
      clearInterval(interval);
      interval = null;
      btnStart.textContent = '开始';
      container.classList.remove('running');
      totalSeconds = min * 60;
      remaining = totalSeconds;
      updateDisplay();
    }
  });
});

updateDisplay();
</script>
</body>
</html>
